services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    command: -jar DynamoDBLocal.jar -inMemory -sharedDb
    working_dir: /home/dynamodblocal
    ports:
      - "8000:8000"

  dynamodb-init:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until aws dynamodb list-tables --endpoint-url http://dynamodb:8000 >/dev/null 2>&1; do
          echo "waiting for dynamodb..."
          sleep 1
        done
        aws dynamodb create-table \
          --endpoint-url http://dynamodb:8000 \
          --table-name "$${DYNAMO_TABLE:-shift-state}" \
          --attribute-definitions AttributeName=messageId,AttributeType=S \
          --key-schema AttributeName=messageId,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          2>/dev/null || echo "table already exists"

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DYNAMO_TABLE: ${DYNAMO_TABLE:-shift-state}
      DYNAMO_ENDPOINT: http://dynamodb:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY}
      OFFICER_ROLE_ID: ${OFFICER_ROLE_ID:-}
      SHIFT_TIMEZONE: ${SHIFT_TIMEZONE:-America/New_York}
      SHIFT_CHANNEL_ID: ${SHIFT_CHANNEL_ID:-}
